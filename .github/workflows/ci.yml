name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce-backend/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ecommerce-backend/backend/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          CSRF_SECRET: test-csrf-secret
          MONGO_URI: mongodb://127.0.0.1:27017/scaleup-test

  admin:
    name: Admin build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ecommerce-admin/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  storefront:
    name: Storefront build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce-storefront
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ecommerce-storefront/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
